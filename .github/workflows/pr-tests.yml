name: Pull Request Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
      AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Enable Corepack and install pnpm
      run: |
        corepack enable
        corepack prepare pnpm@9 --activate

    - name: Install Node dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Generate RPC bindings
      run: python scripts/generate_rpc_bindings.py

    - name: Run RPC contract tests
      run: pytest tests/test_rpc_contracts.py -q

    - name: Run tests
      run: python scripts/run_tests.py --test
